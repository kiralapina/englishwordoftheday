# Автодеплой на сервер при push в main.
# Настройка: в репозитории GitHub → Settings → Secrets and variables → Actions
# добавьте секреты:
#   SERVER_HOST    — хост (например ssh-логин.alwaysdata.net)
#   SERVER_USER   — SSH-логин
#   SSH_PRIVATE_KEY — приватный SSH-ключ (содержимое файла, без пароля)

name: Deploy bot to server

on:
  push:
    branches: [main, master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/admin/telegram-eng-bot || cd ~/telegram-eng-bot || exit 1
            chmod +x scripts/update_and_restart.sh
            ./scripts/update_and_restart.sh
