services:
  bot:
    build: .
    env_file: .env
    restart: unless-stopped
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - DATABASE_URL=${DATABASE_URL}
    # Опционально: если используете PGHOST и т.д. вместо DATABASE_URL
